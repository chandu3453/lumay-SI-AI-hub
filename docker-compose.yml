version: "3.9"

# ==================================================
# lumay-si-ai-hub Docker Compose
# Enterprise AI Insurance Platform
# ==================================================

networks:
  lumay_network:
    driver: bridge
    name: lumay_network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  opensearch_data:
  minio_data:

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart-policy: &restart-policy
  restart: unless-stopped

services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: lumay_postgres
    <<: *restart-policy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lumay_si_db}
      POSTGRES_USER: ${POSTGRES_USER:-lumay_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumay_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - lumay_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lumay_user} -d ${POSTGRES_DB:-lumay_si_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ---- Redis ----
  redis:
    image: redis:7.2-alpine
    container_name: lumay_redis
    <<: *restart-policy
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-lumay_redis_dev}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - lumay_network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-lumay_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ---- RabbitMQ ----
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: lumay_rabbitmq
    <<: *restart-policy
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-lumay_mq_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-lumay_mq_dev}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "15672:15672"
    networks:
      - lumay_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    logging: *default-logging

  # ---- OpenSearch ----
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: lumay_opensearch
    <<: *restart-policy
    environment:
      - cluster.name=lumay-opensearch
      - node.name=lumay-opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD:-Lumay@Dev2024!}
      - plugins.security.disabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
      - "9600:9600"
    networks:
      - lumay_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:9200 -u admin:${OPENSEARCH_PASSWORD:-Lumay@Dev2024!} | grep -q '\"status' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    logging: *default-logging

  # ---- MinIO (Object Storage) ----
  minio:
    image: minio/minio:RELEASE.2024-03-15T01-07-19Z
    container_name: lumay_minio
    <<: *restart-policy
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-lumay_minio_access}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-lumay_minio_dev_secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - lumay_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ---- Backend (FastAPI) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: lumay_backend
    <<: *restart-policy
    env_file:
      - .env
    environment:
      - APPLICATION__ENVIRONMENT=development
      - APPLICATION__DEBUG=true
      - DATABASE__URL=postgresql+asyncpg://${POSTGRES_USER:-lumay_user}:${POSTGRES_PASSWORD:-lumay_dev_password}@postgres:5432/${POSTGRES_DB:-lumay_si_db}
      - REDIS__URL=redis://:${REDIS_PASSWORD:-lumay_redis_dev}@redis:6379/0
      - RABBITMQ__URL=amqp://${RABBITMQ_USER:-lumay_mq_user}:${RABBITMQ_PASSWORD:-lumay_mq_dev}@rabbitmq:5672/
      - OPENSEARCH__URL=https://opensearch:9200
      - OPENSEARCH__PASSWORD=${OPENSEARCH_PASSWORD:-Lumay@Dev2024!}
      - OPENSEARCH__USE_SSL=true
      - MINIO__ENDPOINT=minio:9000
      - MINIO__ACCESS_KEY=${MINIO_ACCESS_KEY:-lumay_minio_access}
      - MINIO__SECRET_KEY=${MINIO_SECRET_KEY:-lumay_minio_dev_secret}
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - lumay_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ---- Frontend (Next.js) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: lumay_frontend
    <<: *restart-policy
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_BASE_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - lumay_network
    depends_on:
      - backend
    logging: *default-logging

  # ---- Nginx (Reverse Proxy) ----
  nginx:
    image: nginx:1.25-alpine
    container_name: lumay_nginx
    <<: *restart-policy
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - lumay_network
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging
