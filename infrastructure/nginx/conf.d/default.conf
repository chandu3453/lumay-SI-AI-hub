# Default HTTP server — redirects to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name lumay.localhost;

    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lumay.localhost;

    # SSL certificates (mount via volume or certbot)
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_trusted_certificate /etc/nginx/ssl/ca.pem;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Root health
    location = / {
        return 301 https://$host/ui/;
    }

    # API proxy
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn addr_limit 10;

        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 3;

        proxy_cache_bypass $http_upgrade;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Correlation-ID" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        # Security
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # OpenSearch proxy (admin-only; restrict in production)
    location /search/ {
        limit_req zone=api_limit burst=20 nodelay;

        rewrite ^/search/(.*) /$1 break;
        proxy_pass https://opensearch:9200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization "";
        proxy_set_header X-Real-IP $remote_addr;

        proxy_buffering off;
    }

    # MinIO Console proxy
    location /minio/ {
        proxy_pass http://minio:9001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # RabbitMQ Management proxy (admin-only)
    location /rabbitmq/ {
        proxy_pass http://rabbitmq:15672;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend — Next.js
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Static assets cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            proxy_pass http://frontend_upstream;
        }
    }

    # Deny access to sensitive paths
    location ~ /\.(git|env|svn|htaccess|DS_Store) {
        deny all;
        return 404;
    }

    location ~ /(node_modules|vendor|storage/logs) {
        deny all;
        return 404;
    }
}
