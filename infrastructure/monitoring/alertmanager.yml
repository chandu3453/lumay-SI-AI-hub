# Alertmanager Configuration — lumay-si-ai-hub

global:
  resolve_timeout: 5m
  slack_api_url: ""
  email:
    to: ""
    from: ""
    smarthost: ""
    auth_username: ""
    auth_password: ""

route:
  receiver: "default"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h

receivers:
  - name: "default"
    slack_configs:
      - channel: "#alerts"
        send_resolved: true

  - name: "critical"
    slack_configs:
      - channel: "#critical"
        send_resolved: true
